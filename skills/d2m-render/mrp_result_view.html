<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>D2M render · MRP result (reference)</title>
<style>
  /* The ONLY brand knob is this font stack; everything below is the contract + rules. */
  :root {
    --font: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    --mono: ui-monospace, Consolas, monospace;
    --ink: #1f2733; --muted: #6b7785; --line: #e4e8ef; --panel: #fff; --bg: #f4f6fa;
    --blue: #2563eb; --amber: #d97706; --green: #16a34a; --red: #dc2626;
    --blue-bg: #eff4ff; --amber-bg: #fff7ed; --green-bg: #ecfdf3; --red-bg: #fef2f2;
  }
  * { box-sizing: border-box; }
  body { font-family: var(--font); color: var(--ink); background: var(--bg); margin: 0; padding: 24px; }
  .d2m { max-width: 720px; margin: 0 auto; }

  /* --- primitive: status banner --- */
  .banner { border-radius: 10px; padding: 10px 14px; font-size: 13px; font-weight: 600; margin-bottom: 12px; border: 1px solid; }
  .banner.success { background: var(--green-bg); color: var(--green); border-color: #bbf7d0; }
  .banner.error   { background: var(--red-bg);   color: var(--red);   border-color: #fecaca; }
  .banner.empty   { background: #f1f5f9; color: var(--muted); border-color: var(--line); }

  /* --- primitive: header slab --- */
  .slab { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
  .slab h2 { margin: 0 0 8px; font-size: 16px; }
  .slab .meta { display: flex; flex-wrap: wrap; gap: 6px 18px; }
  .slab .meta span { font-size: 12px; color: var(--muted); }
  .slab .meta b { color: var(--ink); font-weight: 600; }

  /* --- primitive: stat tiles --- */
  .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .tile { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px; text-align: center; }
  .tile .n { font-size: 24px; font-weight: 700; line-height: 1; }
  .tile .l { font-size: 11px; color: var(--muted); margin-top: 5px; text-transform: uppercase; letter-spacing: .04em; }
  .tile.blue .n { color: var(--blue); } .tile.amber .n { color: var(--amber); }
  .tile.green .n { color: var(--green); } .tile.red .n { color: var(--red); } .tile.muted .n { color: var(--muted); }

  /* --- primitive: section title --- */
  .sec { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 4px 2px 8px; }

  /* --- primitive: cascade / tree --- */
  .tree { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .trow { display: flex; align-items: center; gap: 9px; padding: 8px 12px; border-bottom: 1px solid var(--line); font-size: 13px; }
  .trow:last-child { border-bottom: 0; }
  .trow.exc { background: #fffbeb; }
  .trow .lvl { font-family: var(--mono); font-size: 10px; color: var(--muted); width: 20px; }
  .trow .mat { font-family: var(--mono); font-weight: 700; }
  .trow .lbl { color: var(--muted); flex: 1; }
  .out { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
  .out.blue  { background: var(--blue-bg);  color: var(--blue); }
  .out.amber { background: var(--amber-bg); color: var(--amber); }
  .excmark { font-size: 11px; font-weight: 700; color: var(--amber); }

  /* --- primitive: badge --- */
  .badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px; }
  .badge.made   { background: var(--blue-bg);  color: var(--blue); }   /* FERT/HALB in-house */
  .badge.bought { background: var(--amber-bg); color: var(--amber); }  /* HAWA/ROH external */

  /* --- exceptions footer --- */
  .excfoot { margin-top: 12px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #92400e; }
  .excfoot b { color: #78350f; }
</style>
</head>
<body>
  <div class="d2m" id="view"></div>

<script>
/* =====================================================================================
   renderMrpResult(data, el) -- PURE, model-free. Contract (exact, proven from run_mrp):
   { material, plant, status, multiLevel, timestamp, message,
     run: { purchaseReqsCreated, plannedOrdersCreated, plannedOrdersDeleted, errors },
     materials: [ {mat, type, label, level, proc, output, exception}, ... ] }
   Rules: proc E/X -> planned_order (blue); F -> purchase_req (amber); mark exception rows;
   never show a failed/empty run with success styling.
   ===================================================================================== */
const esc = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
const _int = (v) => { const n = parseInt(v, 10); return isNaN(n) ? 0 : n; };

function _banner(kind, text) {
  const b = document.createElement("div"); b.className = "banner " + kind; b.textContent = text; return b;
}
function _slab(title, meta) {
  const s = document.createElement("div"); s.className = "slab";
  const h = document.createElement("h2"); h.textContent = title; s.appendChild(h);
  const m = document.createElement("div"); m.className = "meta";
  meta.filter(([, v]) => v != null && v !== "").forEach(([k, v]) => {
    const sp = document.createElement("span"); sp.innerHTML = esc(k) + ": <b>" + esc(v) + "</b>"; m.appendChild(sp);
  });
  s.appendChild(m); return s;
}
function _tiles(items) {
  const wrap = document.createElement("div"); wrap.className = "tiles";
  items.forEach(([label, n, tone]) => {
    const t = document.createElement("div"); t.className = "tile " + (tone || "muted");
    t.innerHTML = '<div class="n">' + _int(n) + '</div><div class="l">' + esc(label) + '</div>';
    wrap.appendChild(t);
  });
  return wrap;
}
function _badge(type) {
  const made = ["FERT", "HALB"].includes(String(type).toUpperCase());
  return '<span class="badge ' + (made ? "made" : "bought") + '">' + esc(type) + '</span>';
}
function _cascadeRow(m) {
  const row = document.createElement("div"); row.className = "trow" + (m.exception ? " exc" : "");
  row.style.paddingLeft = (12 + _int(m.level) * 22) + "px";
  const out = m.output || (String(m.proc).toUpperCase() === "F" ? "purchase_req" : "planned_order");
  const tone = out === "planned_order" ? "blue" : "amber";
  row.innerHTML =
    '<span class="lvl">L' + _int(m.level) + '</span>' + _badge(m.type) +
    '<span class="mat">' + esc(m.mat) + '</span>' +
    '<span class="lbl">' + esc(m.label || "") + '</span>' +
    '<span class="out ' + tone + '">' + esc(out.replace("_", " ")) + '</span>' +
    (m.exception ? '<span class="excmark" title="MRP exception message">! exception</span>' : "");
  return row;
}
function _sec(text) { const d = document.createElement("div"); d.className = "sec"; d.textContent = text; return d; }

function renderMrpResult(data, el) {
  el.innerHTML = "";
  if (!data) { el.appendChild(_banner("empty", "No MRP result to show.")); return; }
  const run = data.run || {};
  const mats = Array.isArray(data.materials) ? data.materials : [];
  const failed = ["E", "A"].includes(String(data.status || "").toUpperCase()) || _int(run.errors) > 0;

  // 1) status banner -- never style a failure/empty as success
  el.appendChild(_banner(failed ? "error" : "success",
    data.message || (failed ? "MRP run reported errors." : "MRP carried out.")));

  // 2) header slab -- identity
  el.appendChild(_slab("MRP · " + (data.material || "?"), [
    ["Plant", data.plant],
    ["Mode", data.multiLevel ? "Multi-level (BOM)" : "Single-level"],
    ["Status", data.status],
    ["Run", data.timestamp],
  ]));

  // 3) stat tiles -- the four run deltas
  el.appendChild(_tiles([
    ["Planned orders", run.plannedOrdersCreated, "blue"],
    ["Purchase reqs", run.purchaseReqsCreated, "amber"],
    ["Orders deleted", run.plannedOrdersDeleted, "muted"],
    ["Errors", run.errors, _int(run.errors) > 0 ? "red" : "green"],
  ]));

  // 4) cascade / tree of materials  (or explicit empty)
  if (!mats.length) {
    el.appendChild(_banner("empty", "No MRP elements were planned (no demand, or nothing to cover)."));
  } else {
    el.appendChild(_sec("BOM cascade · " + mats.length + " materials"));
    const tree = document.createElement("div"); tree.className = "tree";
    mats.forEach((m) => tree.appendChild(_cascadeRow(m)));
    el.appendChild(tree);
  }

  // 5) exceptions footer
  const exc = mats.filter((m) => m.exception);
  if (exc.length) {
    const f = document.createElement("div"); f.className = "excfoot";
    f.innerHTML = "<b>" + exc.length + " material(s) carry an MRP exception message</b> — " +
      exc.map((m) => esc(m.mat)).join(", ") + ". Review coverage/dates (e.g. MD04).";
    el.appendChild(f);
  }
}

/* ---- demo render with the proven shape (open this file to see it) ---- */
const SAMPLE = {
  material: "11138", plant: "1710", status: "S", multiLevel: true,
  timestamp: "2026-06-07 18:05",
  message: "MRP carried out for 000000000000011138  1710  1710",
  run: { purchaseReqsCreated: 10, plannedOrdersCreated: 2, plannedOrdersDeleted: 0, errors: 0 },
  materials: [
    { mat: "11138", type: "FERT", label: "Finished product", level: 0, proc: "E", output: "planned_order", exception: true },
    { mat: "11149", type: "HALB", label: "Semi-finished",    level: 1, proc: "E", output: "planned_order", exception: true },
    { mat: "11139", type: "HAWA", label: "Bought part",      level: 1, proc: "F", output: "purchase_req",  exception: true },
    { mat: "11140", type: "HAWA", label: "Bought part",      level: 1, proc: "F", output: "purchase_req",  exception: true },
    { mat: "11142", type: "HAWA", label: "Bought part",      level: 1, proc: "F", output: "purchase_req",  exception: false },
  ],
};
renderMrpResult(SAMPLE, document.getElementById("view"));
</script>
</body>
</html>
