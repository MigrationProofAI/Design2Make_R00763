<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 736" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#64748b"/></marker>
    <marker id="al" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#cbd5e1"/></marker>
    <marker id="ar" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/></marker>
  </defs>
  <rect width="1140" height="736" fill="#f8fafc"/>
  <text x="570" y="22" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Design → Make → Plan — one composable loop (assembled from the same Lego blocks)</text>
  <text x="570" y="42" text-anchor="middle" font-size="11" fill="#475569">Agents (role-based):  🎼 ConductorAgent · 🔧 EnggAgent · 🛒 ProcAgent · ✅ CompAgent · 💰 FinAgent</text>

  <!-- LEFT: Discipline spine -->
  <rect x="14" y="64" width="140" height="630" rx="9" fill="#f1f5f9" stroke="#475569" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="24" y="86" font-size="12" font-weight="700" fill="#334155">🛡 DISCIPLINE</text>
  <text x="24" y="100" font-size="12" font-weight="700" fill="#334155">S0–S8</text>
  <text x="24" y="124" font-size="9.5" fill="#475569">S0 · trace + cost</text>
  <text x="24" y="137" font-size="9.5" fill="#475569">      on every step</text>
  <text x="24" y="158" font-size="9.5" fill="#475569">S2 · confidence</text>
  <text x="24" y="171" font-size="9.5" fill="#475569">      calibration</text>
  <text x="24" y="192" font-size="9.5" fill="#475569">S5 · decision</text>
  <text x="24" y="205" font-size="9.5" fill="#475569">      records</text>
  <text x="24" y="226" font-size="9.5" fill="#475569">S7 · human</text>
  <text x="24" y="239" font-size="9.5" fill="#475569">      escalation</text>
  <text x="24" y="260" font-size="9.5" fill="#475569">S8 · reopen ONLY</text>
  <text x="24" y="273" font-size="9.5" fill="#475569">      invalidated</text>
  <text x="24" y="300" font-size="9.5" font-style="italic" fill="#64748b">wraps every</text>
  <text x="24" y="313" font-size="9.5" font-style="italic" fill="#64748b">stage  ⟷</text>

  <!-- RIGHT: Brain (KG + memory + vectors + code-book) -->
  <rect x="986" y="64" width="140" height="630" rx="9" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="996" y="86" font-size="13" font-weight="700" fill="#5b21b6">🧠 BRAIN</text>
  <text x="996" y="108" font-size="9.5" font-weight="700" fill="#166534">🕸 Knowledge Graph</text>
  <text x="996" y="121" font-size="9" fill="#14532d">objects=nodes; edges:</text>
  <text x="996" y="133" font-size="9" fill="#14532d">alternative-to · uses ·</text>
  <text x="996" y="145" font-size="9" fill="#14532d">supplied-by · routed-thru</text>
  <text x="996" y="157" font-size="9" fill="#14532d">→ correct re-explosion</text>
  <text x="996" y="180" font-size="9.5" font-weight="700" fill="#5b21b6">📘 Memory (learned)</text>
  <text x="996" y="193" font-size="9" fill="#4c1d95">knowledge.md + remember()</text>
  <text x="996" y="205" font-size="9" fill="#4c1d95">e.g. "Hormuz lane risky</text>
  <text x="996" y="217" font-size="9" fill="#4c1d95">→ prefer EU alt"</text>
  <text x="996" y="240" font-size="9.5" font-weight="700" fill="#5b21b6">🔢 Vectors · 🗂 Code-book</text>
  <text x="996" y="253" font-size="9" fill="#4c1d95">semantic recall ·</text>
  <text x="996" y="265" font-size="9" fill="#4c1d95">item-cat · control keys ·</text>
  <text x="996" y="277" font-size="9" fill="#4c1d95">MRP / procurement types</text>
  <text x="996" y="300" font-size="9.5" font-weight="700" fill="#5b21b6">🗨 Conversation (session)</text>
  <text x="996" y="324" font-size="9" font-style="italic" fill="#7c3aed">agents read to reason ·</text>
  <text x="996" y="336" font-size="9" font-style="italic" fill="#7c3aed">write lessons (learn)  ⟷</text>
  <line x1="960" y1="300" x2="984" y2="300" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#a)"/>

  <!-- Inbound + Conductor -->
  <rect x="302" y="56" width="540" height="32" rx="7" fill="#0f172a"/>
  <text x="572" y="77" text-anchor="middle" font-size="12" fill="#e2e8f0">📥 Inbound — PDF · CAD · CSV · 🎤 voice   (evidence-grounded)</text>
  <line x1="572" y1="88" x2="572" y2="104" stroke="#64748b" stroke-width="1.4" marker-end="url(#a)"/>
  <rect x="422" y="104" width="300" height="38" rx="19" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.6"/>
  <text x="572" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">🎼 ConductorAgent (router / coordinator)</text>
  <line x1="572" y1="142" x2="572" y2="176" stroke="#64748b" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- DESIGN -> MAKE box (Sequential) -->
  <rect x="172" y="176" width="788" height="276" rx="11" fill="#fff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="184" y="195" font-size="12" font-weight="700" fill="#475569">🧩 DESIGN → MAKE · genesis — SequentialAgent (9 stages, each: ground → confirm → commit)</text>

  <!-- row 1 -->
  <rect x="184" y="206" width="92" height="30" rx="7" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.6"/><text x="230" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">1 Perceive</text>
  <line x1="276" y1="221" x2="290" y2="221" stroke="#64748b" stroke-width="1.3" marker-end="url(#a)"/>
  <rect x="292" y="206" width="108" height="30" rx="7" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.6"/><text x="346" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">2 Extract 🔧</text>
  <line x1="400" y1="221" x2="414" y2="221" stroke="#64748b" stroke-width="1.3" marker-end="url(#a)"/>
  <rect x="416" y="206" width="128" height="30" rx="7" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.6"/><text x="480" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">3 Plan deps 🎼</text>
  <line x1="544" y1="221" x2="556" y2="221" stroke="#64748b" stroke-width="1.3" marker-end="url(#a)"/>
  <rect x="558" y="204" width="394" height="36" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="755" y="227" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">⚖ 4 Boardroom · ParallelAgent — 🔧🛒✅💰🎼 debate → confidence</text>

  <!-- fork -->
  <text x="184" y="266" font-size="11" font-weight="700" fill="#475569">⑂ fork by role</text>
  <rect x="292" y="252" width="300" height="28" rx="7" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.6"/><text x="442" y="270" text-anchor="middle" font-size="11" fill="#1e3a8a"><tspan font-weight="700">bought →</tspan> 5 Source / Info-Record 🛒 (ProcAgent)</text>
  <rect x="292" y="286" width="430" height="28" rx="7" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.6"/><text x="507" y="304" text-anchor="middle" font-size="11" fill="#1e3a8a"><tspan font-weight="700">made →</tspan> 6 BOM 🔧  ·  7 Routing 🔧  ·  8 Cost 💰</text>

  <!-- commit + gate -->
  <rect x="292" y="332" width="220" height="34" rx="7" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.6"/><text x="402" y="353" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">9 Commit + Verify 🎼</text>
  <rect x="528" y="332" width="340" height="34" rx="7" fill="#fef3c7" stroke="#d97706" stroke-width="1.6"/><text x="698" y="348" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400e">🔒 review-panel gate → human if low-confidence</text><text x="698" y="361" text-anchor="middle" font-size="9" fill="#92400e">OData → read-back</text>
  <text x="184" y="392" font-size="9.5" font-style="italic" fill="#64748b">every stage emits confidence + serialized trace  →  fed to S0 / S2 (left), objects to the KG (right)</text>
  <text x="184" y="430" font-size="9.5" fill="#94a3b8">tools used at every stage via MCP ↕ (sap.py) — see band below</text>

  <line x1="572" y1="452" x2="572" y2="470" stroke="#64748b" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="600" y="465" font-size="10" fill="#64748b">commit → plan</text>

  <!-- PLAN box (Sequential) -->
  <rect x="302" y="470" width="540" height="84" rx="10" fill="#fff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="572" y="489" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">🗓 PLAN — SequentialAgent</text>
  <text x="572" y="509" text-anchor="middle" font-size="11.5" fill="#1e293b">Independent Reqs  →  MRP <tspan font-weight="700">(deterministic engine)</tspan>  →  Result</text>
  <text x="572" y="527" text-anchor="middle" font-size="11" fill="#1e293b">→ planned orders (make)  +  purchase reqs (buy)</text>
  <text x="572" y="545" text-anchor="middle" font-size="9.5" font-style="italic" fill="#64748b">🎼 AI sets the dials · MRP turns the crank · agents triage exceptions</text>

  <!-- loop-back -->
  <path d="M302,512 C170,512 170,300 172,300" fill="none" stroke="#dc2626" stroke-width="2.2" stroke-dasharray="2 0" marker-end="url(#ar)"/>
  <text x="160" y="410" font-size="10.5" font-weight="700" fill="#dc2626" transform="rotate(-90 160 410)">🔁 re-genesis — reopen ONLY invalidated steps</text>
  <text x="572" y="576" text-anchor="middle" font-size="10" fill="#b91c1c">exception (lead-time · supply · geo-risk)  →  🛒 ProcAgent proposes alt  →  ✅ CompAgent clears  →  💰 FinAgent prices  →  🎼 ConductorAgent decides  →  swap</text>

  <!-- MCP tools band -->
  <line x1="700" y1="554" x2="700" y2="596" stroke="#cbd5e1" stroke-width="1.3" marker-end="url(#al)"/>
  <rect x="172" y="596" width="788" height="62" rx="9" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.4"/>
  <text x="184" y="614" font-size="11.5" font-weight="700" fill="#075985">🔌 MCP tools · sap.py extensions  (both Make &amp; Plan call these, MCP ↕)</text>
  <text x="184" y="631" font-size="9.5" fill="#334155">create_material · create_info_record · create_bom · create_routing · create_cost_estimate</text>
  <text x="184" y="647" font-size="9.5" fill="#334155">create_independent_requirements · run_mrp · read_mrp_result    + code-book (item-cat · control-keys · MRP / procurement types)</text>

  <!-- SAP -->
  <line x1="572" y1="658" x2="572" y2="672" stroke="#64748b" stroke-width="1.3" marker-end="url(#a)"/>
  <rect x="172" y="672" width="788" height="30" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="566" y="691" text-anchor="middle" font-size="10.5" fill="#7f1d1d"><tspan font-weight="700">🗄 SAP S/4HANA</tspan> — system of record · OData.  MRP = custom FM (BAPI_MATERIAL_PLANNING) wrapped as a Z OData service → consumed as an MCP tool (not batch)</text>

  <!-- key -->
  <text x="572" y="722" text-anchor="middle" font-size="10" fill="#475569"><tspan font-weight="700">solid</tspan> = LLM agent (persona)  ·  <tspan font-weight="700">dashed</tspan> = orchestrator (Sequential / Parallel / Loop)  ·  <tspan font-weight="700">🔒</tspan> human gate  ·  <tspan font-weight="700" fill="#dc2626">🔁 red</tspan> = re-genesis loop</text>
</svg>
